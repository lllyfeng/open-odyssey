name: Memory quality report
description: Report inaccurate recall, missing recall, or poor memory extraction.
title: "[Memory]: "
labels: ["memory-quality", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the memory issue without pasting private raw conversations. A paraphrase is usually enough.
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - It failed to recall a relevant memory
        - It recalled the wrong memory
        - It treated a Reference as personal memory
        - It wrote a poor summary
        - It wrote a poor value observation
        - It wrote a poor behavior pattern
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What happened?
      description: Paraphrase the user message and Odyssey response.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should Odyssey have done?
      description: Describe the expected recall or memory behavior.
    validations:
      required: true
  - type: input
    id: model_provider
    attributes:
      label: Model provider and model
      placeholder: "Claude / GPT / DeepSeek / Ollama model name"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I paraphrased or redacted private details and did not include raw memory files or API secrets.
          required: true

name: Bug report
description: Report a reproducible Odyssey beta bug.
title: "[Bug]: "
labels: ["bug", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Odyssey. Please do not paste private memory contents, API keys, tokens, raw `.odyssey/` Shadow Index files, or unredacted vault paths.
  - type: input
    id: version
    attributes:
      label: Odyssey version
      placeholder: "0.1.8"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Obsidian 1.x, BRAT/manual install"
    validations:
      required: true
  - type: dropdown
    id: model_provider
    attributes:
      label: Model provider
      options:
        - Ollama
        - OpenAI
        - Anthropic Claude
        - DeepSeek
        - Groq
        - Other OpenAI-compatible
        - Not model-related
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Describe the smallest sequence that triggers the issue.
      placeholder: "1. Open Odyssey...\n2. Send...\n3. Click..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized error messages if available.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private memory contents, API keys, tokens, raw Shadow Index data, and unredacted vault paths.
          required: true

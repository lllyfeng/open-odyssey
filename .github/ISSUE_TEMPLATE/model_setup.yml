name: Model setup help
description: Ask for help configuring a model endpoint.
title: "[Model setup]: "
labels: ["model-setup", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Never paste your API key. Only include provider, base URL, model name, and sanitized error text.
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Ollama
        - OpenAI
        - Anthropic Claude
        - DeepSeek
        - Groq
        - Other OpenAI-compatible
    validations:
      required: true
  - type: input
    id: base_url
    attributes:
      label: API Base URL
      placeholder: "https://api.anthropic.com/v1"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model name
      placeholder: "claude-sonnet-4-5"
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Sanitized error message
      description: Remove API keys, tokens, and private text.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include my API key or other secrets.
          required: true
